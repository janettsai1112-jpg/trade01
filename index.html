<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知識庫檢索系統</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader {
            border-top-color: #3B82F6;
            -webkit-animation: spinner 1.5s linear infinite;
            animation: spinner 1.5s linear infinite;
        }
        @-webkit-keyframes spinner {
            0% { -webkit-transform: rotate(0deg); }
            100% { -webkit-transform: rotate(360deg); }
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- Header / Navbar -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900">知識庫檢索系統</h1>
                    <p class="text-xs text-slate-500">自動即時同步 Google 試算表</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2">
                <button onclick="fetchData()" class="flex items-center text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2 px-3 rounded-md transition-colors">
                    <svg id="refreshIcon" class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    手動刷新
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        
        <!-- Controls: Search and Filters -->
        <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4">
            <!-- Search Bar -->
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="searchInput" oninput="filterData()" placeholder="搜尋關鍵字（標題、內文、分類...）" class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md leading-5 bg-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
            </div>

            <!-- Type Filter -->
            <div class="w-full md:w-48">
                <select id="typeFilter" onchange="filterData()" class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    <option value="">全部類型 (Type)</option>
                </select>
            </div>

            <!-- Category Filter -->
            <div class="w-full md:w-48">
                <select id="categoryFilter" onchange="filterData()" class="block w-full py-2 px-3 border border-slate-300 bg-white rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
                    <option value="">全部分類 (Category)</option>
                </select>
            </div>
        </div>

        <!-- Status & Results Summary -->
        <div class="flex justify-between items-center mb-4 text-xs text-slate-500 px-1">
            <span id="statusMessage">資料讀取中...</span>
            <span id="resultCount"></span>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="flex justify-center items-center py-12">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10"></div>
        </div>

        <!-- Error Message Container -->
        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6"></div>

        <!-- Results Grid -->
        <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Cards will be injected here dynamically -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-12 bg-white rounded-xl border border-slate-200">
            <svg class="mx-auto h-12 w-12 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h3 class="mt-2 text-sm font-medium text-slate-900">找不到符合的資料</h3>
            <p class="mt-1 text-xs text-slate-500">請嘗試調整您的搜尋關鍵字或篩選條件。</p>
        </div>

    </main>

    <script>
        // =========================================================================
        // ⚙️ 設定區：請在這裡修改您的 Google 試算表資訊
        // =========================================================================
        const SPREADSHEET_ID = '你的Google試算表ID'; // 貼上你的 Google 試算表 ID
        const GID = '0';                              // 貼上你的工作表 GID（預設第一頁通常是 0）
        // =========================================================================

        let allData = [];
        let filteredData = [];

        // 頁面載入完成後自動執行
        window.onload = function() {
            fetchData();
        };

        // 從 Google GViz API 抓取 JSON 資料
        function fetchData() {
            showLoading(true);
            hideError();

            const refreshIcon = document.getElementById('refreshIcon');
            refreshIcon.classList.add('animate-spin');

            // 建立 GViz API 請求 URL
            const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error('無法存取 Google 試算表，請確認分享權限是否已開啟。');
                    }
                    return response.text();
                })
                .then(text => {
                    // GViz 返回的格式為 google.visualization.Query.setResponse({...});
                    // 需要將前後的 JS 函式包裹字串裁切掉，轉為純 JSON 格式
                    const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                    const data = JSON.parse(jsonString);
                    
                    parseGoogleSheetsData(data);
                    showLoading(false);
                    refreshIcon.classList.remove('animate-spin');
                })
                .catch(error => {
                    console.error('Error:', error);
                    showError('讀取資料失敗：' + error.message + '。請確保試算表已開啟「知道連結的人即可檢視」權限。');
                    showLoading(false);
                    refreshIcon.classList.remove('animate-spin');
                });
        }

        // 解析 GViz JSON 物件
        function parseGoogleSheetsData(gvizData) {
            const table = gvizData.table;
            if (!table || !table.rows || table.rows.length === 0) {
                showError('試算表中沒有找到任何資料。');
                return;
            }

            // 取得表頭欄位名稱
            const headers = table.cols.map(col => col ? (col.label || '').trim() : '');
            
            // 欄位名稱對應智慧判斷 (對應 Type, 分類, 標題, 內容)
            let typeIdx = headers.findIndex(h => /type|類型/i.test(h));
            let categoryIdx = headers.findIndex(h => /category|分類/i.test(h));
            let titleIdx = headers.findIndex(h => /title|標題/i.test(h));
            let contentIdx = headers.findIndex(h => /content|內容|描述|說明/i.test(h));

            // 如果沒有抓到對應的欄位表頭，退回預設索引位置
            if (typeIdx === -1) typeIdx = 0;
            if (categoryIdx === -1) categoryIdx = 1;
            if (titleIdx === -1) titleIdx = 2;
            if (contentIdx === -1) contentIdx = 3;

            allData = [];

            // 逐列解析資料
            table.rows.forEach((row, index) => {
                const c = row.c;
                if (!c) return;

                const getValue = (idx) => {
                    if (idx < 0 || idx >= c.length || !c[idx]) return '';
                    // c[idx].v 為原始值，c[idx].f 為格式化後的顯示文字
                    return (c[idx].f !== undefined && c[idx].f !== null) ? c[idx].f : (c[idx].v !== null ? c[idx].v : '');
                };

                const typeVal = String(getValue(typeIdx)).trim();
                const categoryVal = String(getValue(categoryIdx)).trim();
                const titleVal = String(getValue(titleIdx)).trim();
                const contentVal = String(getValue(contentIdx)).trim();

                // 排除空白資料列
                if (typeVal || categoryVal || titleVal || contentVal) {
                    allData.push({
                        id: index,
                        type: typeVal || '未分類',
                        category: categoryVal || '通用',
                        title: titleVal || '無標題',
                        content: contentVal || ''
                    });
                }
            });

            // 更新篩選下拉選單選項
            populateSelectOptions();

            // 執行第一次篩選與渲染
            filterData();

            // 更新時間顯示
            const now = new Date();
            document.getElementById('statusMessage').textContent = `最後同步時間：${now.toLocaleTimeString()}`;
        }

        // 動態產生下拉選單選項
        function populateSelectOptions() {
            const typeSelect = document.getElementById('typeFilter');
            const categorySelect = document.getElementById('categoryFilter');

            const currentType = typeSelect.value;
            const currentCategory = categorySelect.value;

            // 收集所有不重複的 Type 與 Category
            const types = [...new Set(allData.map(item => item.type))].filter(Boolean);
            const categories = [...new Set(allData.map(item => item.category))].filter(Boolean);

            typeSelect.innerHTML = '<option value="">全部類型 (Type)</option>';
            types.forEach(t => {
                typeSelect.innerHTML += `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`;
            });

            categorySelect.innerHTML = '<option value="">全部分類 (Category)</option>';
            categories.forEach(c => {
                categorySelect.innerHTML += `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`;
            });

            typeSelect.value = currentType;
            categorySelect.value = currentCategory;
        }

        // 搜尋與篩選主邏輯
        function filterData() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase().trim();
            const selectedType = document.getElementById('typeFilter').value;
            const selectedCategory = document.getElementById('categoryFilter').value;

            filteredData = allData.filter(item => {
                const matchesSearch = !searchValue || 
                    item.title.toLowerCase().includes(searchValue) || 
                    item.content.toLowerCase().includes(searchValue) ||
                    item.type.toLowerCase().includes(searchValue) ||
                    item.category.toLowerCase().includes(searchValue);

                const matchesType = !selectedType || item.type === selectedType;
                const matchesCategory = !selectedCategory || item.category === selectedCategory;

                return matchesSearch && matchesType && matchesCategory;
            });

            renderGrid();
        }

        // 渲染卡片結果至畫面上
        function renderGrid() {
            const grid = document.getElementById('resultsGrid');
            const emptyState = document.getElementById('emptyState');
            const resultCount = document.getElementById('resultCount');

            grid.innerHTML = '';
            resultCount.textContent = `共計 ${filteredData.length} 筆資料`;

            if (filteredData.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                filteredData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'bg-white rounded-xl shadow-sm border border-slate-200 p-5 hover:shadow-md transition-shadow flex flex-col justify-between';
                    
                    // 根據內文是否包含網址自動轉換為超連結，並支援換行顯示
                    const formattedContent = formatContent(item.content);

                    card.innerHTML = `
                        <div>
                            <div class="flex items-center space-x-2 mb-2">
                                <span class="bg-blue-50 text-blue-700 text-xs font-semibold px-2.5 py-0.5 rounded border border-blue-100">
                                    ${escapeHtml(item.type)}
                                </span>
                                <span class="bg-slate-100 text-slate-600 text-xs font-medium px-2.5 py-0.5 rounded">
                                    ${escapeHtml(item.category)}
                                </span>
                            </div>
                            <h3 class="text-base font-bold text-slate-900 mb-2 leading-snug">
                                ${escapeHtml(item.title)}
                            </h3>
                            <div class="text-slate-600 text-sm whitespace-pre-line leading-relaxed">
                                ${formattedContent}
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // 格式化內文：轉換網址為可點擊連結
        function formatContent(text) {
            if (!text) return '';
            const escaped = escapeHtml(text);
            // 偵測 HTTP/HTTPS 網址並轉為 <a> 標籤
            const urlPattern = /(https?:\/\/[^\s]+)/g;
            return escaped.replace(urlPattern, url => {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-blue-600 hover:underline break-all inline-flex items-center">
                    ${url}
                    <svg class="w-3 h-3 ml-1 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </a>`;
            });
        }

        // XSS 安全防護：轉義 HTML 特殊字元
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // 顯示 / 隱藏 Loading 載入動畫
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (show) {
                loading.classList.remove('hidden');
                document.getElementById('resultsGrid').innerHTML = '';
                document.getElementById('emptyState').classList.add('hidden');
            } else {
                loading.classList.add('hidden');
            }
        }

        // 顯示錯誤訊息
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = msg;
            errorDiv.classList.remove('hidden');
        }

        // 隱藏錯誤訊息
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
    </script>
</body>
</html>
